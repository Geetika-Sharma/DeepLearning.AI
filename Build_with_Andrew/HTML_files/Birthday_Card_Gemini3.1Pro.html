<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Birthday Card Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffdeeb;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #d11a2a;
            font-size: 3em;
            text-shadow: 2px 2px #ffc107;
            margin-bottom: 30px;
            text-align: center;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 40px;
        }

        .form-section {
            flex: 1;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border: 3px solid #ffc107;
            height: fit-content;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #00acc1;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            background-color: #d11a2a;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #a31420;
        }

        .cards-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: #fffafa;
            border: 2px solid #e0e0e0;
            border-left: 20px solid #d11a2a; /* Represents the card fold */
            padding: 40px;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05), 0 10px 20px rgba(0,0,0,0.1);
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive;
            font-size: 1.5em;
            line-height: 1.6;
            color: #444;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <h1>🎈 The Ultimate Birthday Card Generator 🎂</h1>

    <div class="container">
        <div class="form-section">
            <form id="cardForm">
                <div class="input-group">
                    <label for="name">Birthday Person's Name:</label>
                    <input type="text" id="name" required placeholder="e.g. Alex">
                </div>
                <div class="input-group">
                    <label for="age">Age Turning:</label>
                    <input type="number" id="age" required placeholder="e.g. 30">
                </div>
                <div class="input-group">
                    <label for="hobby">Favorite Hobby:</label>
                    <input type="text" id="hobby" required placeholder="e.g. eating cheese">
                </div>
                <button type="submit">Generate Funny Card!</button>
            </form>
        </div>

        <div class="cards-section" id="cardsContainer">
            <!-- Cards will be stacked here -->
        </div>
    </div>

    <script>
        document.getElementById('cardForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const age = document.getElementById('age').value;
            const hobby = document.getElementById('hobby').value;

            const messages = [
                `Happy ${age}th Birthday, ${name}! You're one year closer to spending all your time ${hobby} and complaining about your knees!`,
                `Cheers to ${age} years, ${name}! At this rate, your primary talent is ${hobby} and surviving. Keep it up!`,
                `${name}, congratulations on turning ${age}! May your day be as spectacular as you are when you're ${hobby}.`,
                `Happy Birthday ${name}! You don't look a day over "needs a nap after ${hobby}". Enjoy your ${age}th!`
            ];

            const randomMessage = messages[Math.floor(Math.random() * messages.length)];

            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.innerHTML = `Dear ${name},<br><br>${randomMessage}<br><br>With love,<br>The Card Generator`;

            const container = document.getElementById('cardsContainer');
            // Prepend adds the new card to the top, pushing older ones down
            container.prepend(cardDiv);

            // Optional: Form reset after submission
            document.getElementById('cardForm').reset();
        });
    </script>
</body>
</html>
